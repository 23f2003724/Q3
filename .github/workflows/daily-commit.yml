name: Daily Commit by 23f2003724@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 9 * * *'  # runs daily at 9:00 AM

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Make a small change
      - name: Update timestamp
        run: |
          echo "Last update: $(date)" >> daily_update.txt

      # Step 3: Commit the change
      - name: Commit changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "23f2003724@ds.study.iitm.ac.in"
          git add daily_update.txt
          git commit -m "Automated daily commit"
          git push
