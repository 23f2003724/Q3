name: Daily Commit Workflow

on:
  schedule:
    - cron: '17 4 * * *'   # Runs daily at 04:17 UTC (specific time, no wildcards)
  workflow_dispatch:

run-name: 23f2003724@ds.study.iitm.ac.in

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: 23f2003724@ds.study.iitm.ac.in
        run: echo "Running daily workflow"

      - name: Create daily commit
        run: |
          echo "Daily update $(date)" >> daily.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily.txt
          git commit -m "Daily auto commit"
          git push
